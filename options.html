<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AWS URL Prettier — Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-width: 560px;
      margin: 24px auto;
      padding: 0 24px;
      color: #1a1a1a;
    }
    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { color: #666; margin-bottom: 24px; font-size: 13px; line-height: 1.4; }
    label { display: block; margin-top: 14px; font-weight: 600; font-size: 13px; }
    input[type=text] {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .hint { color: #777; font-size: 12px; margin-top: 6px; line-height: 1.4; }
    .actions { margin-top: 20px; display: flex; gap: 10px; align-items: center; }
    button.primary {
      padding: 10px 18px;
      background: #007acc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button.primary:hover { background: #005b99; }
    #status { color: #2a8a2a; font-size: 13px; }
    code { background: #f3f3f3; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <h1>AWS URL Prettier — Settings</h1>
  <div class="subtitle">
    Wraps cleaned AWS console URLs in your AWS SSO start URL so shared links go through federated login.
    Account ID and role are detected automatically from the AWS page being shared.
  </div>

  <label>SSO portal subdomain
    <input type="text" id="ssoPortal" placeholder="your-org-sso">
  </label>
  <div class="hint">
    Just the subdomain — e.g. <code>your-org-sso</code> for <code>https://your-org-sso.awsapps.com</code>.
  </div>

  <div class="actions">
    <button class="primary" id="saveBtn">Save</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
